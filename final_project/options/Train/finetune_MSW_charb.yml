# Fine-tune MSW-DAT với Charbonnier loss
# Current: L1 loss → 34.287 leaderboard
# Expected: Charbonnier more robust to outliers → +0.1-0.15 dB
name: MSW_finetune_charb
model_type: DATModel
scale: 4
num_gpu: auto
manual_seed: 10

datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: ./datasets/train/HR
    dataroot_lq: ./datasets/train/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 256
    use_hflip: true
    use_rot: true
    use_shuffle: True
    num_worker_per_gpu: 12
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    task: SR
    name: Set5
    type: PairedImageDataset
    dataroot_gt: ./datasets/val/HR
    dataroot_lq: ./datasets/val/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: DAT
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  split_size: [8, 8]
  depth: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  expansion_factor: 4
  resi_connection: '1conv'

path:
  pretrain_network_g: ./experiments/MSW/models/net_g_475000.pth
  strict_load_g: True
  resume_state: ~

train:
  optim_g:
    type: Adam
    lr: !!float 1e-5      # Rất thấp — chỉ fine-tune, không phá vỡ đã học
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [50000, 80000]
    gamma: 0.5

  total_iter: 100000
  warmup_iter: -1

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
    eps: !!float 1e-9

val:
  val_freq: !!float 5e3
  save_img: False
  use_tta: False    # Tắt TTA trong training để nhanh hơn
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: True

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: True
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29506
