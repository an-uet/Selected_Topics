# WaveDAT = MSW-DAT + WaveDFE (in AIM) + FGCA (before spatial blocks)
# Params: 29.2M (+14.4M vs DAT 14.8M)
# Warm-start từ MSW-DAT net_g_475000.pth (82.8% keys match, strict_load=False)
name: WaveDAT
model_type: DATModel
scale: 4
num_gpu: auto
manual_seed: 10

datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: ./datasets/train/HR
    dataroot_lq: ./datasets/train/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 256
    use_hflip: true
    use_rot: true
    use_shuffle: True
    num_worker_per_gpu: 8
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    task: SR
    name: Set5
    type: PairedImageDataset
    dataroot_gt: ./datasets/val/HR
    dataroot_lq: ./datasets/val/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: WaveDAT
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  split_size: [8, 8]
  depth: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  expansion_factor: 4
  resi_connection: '1conv'

path:
  # pretrain_network_g: 
  pretrain_network_g: ./experiments/MSW/models/net_g_475000.pth
  strict_load_g: False    # 82.8% match — WaveDFE/FGCA layers random init
  resume_state: ~

train:
  optim_g:
    type: Adam
    lr: !!float 5e-5      # Thấp vì warm-start từ converged model
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [100000, 200000, 250000, 350000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean
    eps: !!float 1e-9

val:
  val_freq: !!float 5e3
  save_img: False
  use_tta: False
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: True

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: True
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29507
