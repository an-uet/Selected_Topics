# general settings
name: MSW_finetune_charb
model_type: DATModel
scale: 4
num_gpu: 1
manual_seed: 10

datasets:
  test_1:  # the 1st test dataset
    name: Single
    type: SingleImageDataset
    dataroot_lq: /mnt/HDD4/anlt/data/test/lr
    io_backend:
      type: disk
    
    num_worker_per_gpu: 12
    batch_size_per_gpu: 8


# network structures
network_g:
  type: DAT
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  split_size: [8,8]
  depth: [6,6,6,6,6,6]
  embed_dim: 180
  num_heads: [6,6,6,6,6,6]
  expansion_factor: 4
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /mnt/HDD4/anlt/selected_topics/Selected_Topics/final_proj/experiments/MSW_finetune_charb_fft/models/net_g_140000.pth
  strict_load_g: True

# validation settings
val:
  save_img: True
  suffix: 'x4'  # add suffix to saved images, if None, use exp name
  use_chop: False  # True to save memory, if img too large
  use_tta: True   # geometric self-ensemble (8 augmentations)
