_BASE_: "../Base-RCNN-FPN.yaml"
MODEL:
  MASK_ON: True
  WEIGHTS: "checkpoints/r101_fpn_200.pkl"
  MPVIT:
    NAME: "mpvit_base"
    DROP_PATH: 0.4
INPUT:
  CROP:
    ENABLED: True
    TYPE: "absolute_range"
    SIZE: (384, 600)
AUG:
  DETR: True
SOLVER:
  IMS_PER_BATCH: 4
  AMP:
    ENABLED: true
INPUT:
  CROP:
    ENABLED: false
    SIZE:
    - 0.9
    - 0.9
    TYPE: relative_range
  FORMAT: BGR
  MASK_FORMAT: polygon
  MAX_SIZE_TEST: 1333
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MIN_SIZE_TRAIN:
  - 640
  - 672
  - 704
  - 736
  - 768
  MIN_SIZE_TRAIN_SAMPLING: choice
  RANDOM_FLIP: horizontal
OUTPUT_DIR: "checkpoints/mpvit/mask_rcnn_mpvit_base_ms_3x_r101_FPN_200"

# CUDA_VISIBLE_DEVICES=4,5,6,7 python train_net.py --config-file configs/maskrcnn/mask_rcnn_mpvit_base_ms_3x.yaml --num-gpus 4
